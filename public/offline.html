<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Finsight AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #f9fafb;
      color: #333;
    }
    h1 {
      color: #0d9488;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #0d9488;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0b7a70;
    }
  </style>
</head>
<body>
  <h1>Finsight AI</h1>
  <p>You’re offline. Don’t worry — your dashboard data is safe.</p>
  <p>Reconnect to access live forecasts and alerts.</p>
  <button onclick="window.location.reload();">Retry Connection</button>
</body>
</html>
